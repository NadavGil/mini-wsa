spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000        # fail-fast: don't block Tomcat threads for 30s on DB outage
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
  jpa:
    hibernate:
      # NEVER use 'update' in production — Hibernate cannot safely migrate schemas.
      # Flyway owns all schema changes; Hibernate only validates mappings at startup.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
