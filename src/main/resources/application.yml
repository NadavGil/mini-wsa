spring:
  application:
    name: mini-wsa
  profiles:
    active: h2
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
  servlet:
    multipart:
      max-request-size: 5MB
      max-file-size: 5MB

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 4194304   # applies to form-encoded bodies only (not JSON)
    max-swallow-size: 4194304          # limits JSON request body buffering in Tomcat
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized   # DB pool, disk, ping — visible to ops, hidden from public
    metrics:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

wsa:
  ingestion:
    max-batch-size: 500
    max-future-offset-minutes: 5
    async:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 1000        # CallerRunsPolicy kicks in when full — backpressure, not drop
  cache:
    max-ip-entries: 10000
    window-minutes: 10
    repeat-offender-threshold: 5
    redis:
      enabled: false              # Set true + configure spring.data.redis.* for multi-instance deployments
  rate-limit:
    requests-per-minute: 200     # global per-IP cap applied uniformly by RateLimitConfig
    # Per-endpoint limits (ingest vs stats vs samples) are a planned enhancement.
    # RateLimitConfig currently applies one bucket per IP across all paths.
    # To implement per-endpoint limits: create a separate Bucket4j bucket per
    # (clientIp, path-prefix) pair keyed off the request URI.
  stats:
    max-range-days: 90
  alerts:
    max-rules: 100
